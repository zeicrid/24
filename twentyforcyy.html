<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game 24 - Merge Tiles</title>
<link rel="stylesheet" href="game24.css">
</head>
<body>

<div class="overlay" id="welcomeOverlay">
  <div class="welcome-box">
    <p>Operasikan bilangan agar menjadi 24</p>
    <button class="start-btn" id="startBtn">Mulai</button>
  </div>
</div>

<div class="overlay" id="confirmOverlay" style="display:none;">
  <div class="welcome-box">
    <p>Reset level?</p>
    <div class="controls-row">
      <button id="confirmYesBtn" class="danger-btn">Ya</button>
      <button id="confirmNoBtn">Tidak</button>
    </div>
  </div>
</div>

<div class="card" id="gameCard">
  <div class="header">
    <div class="stats">
      <span>Level <b id="levelNum">1</b></span>
      <span>Rekor <b id="bestNum">1</b></span>
    </div>
    <button id="resetLevelBtn" class="danger-btn">Reset level</button>
    <button id="hintBtn">Solusi</button>
  </div>

  <div id="tilesWrapper">
    <div id="tiles"></div>
  </div>

  <div class="controls-row">
    <button class="op-btn" data-op="+">+</button>
    <button class="op-btn" data-op="-">&minus;</button>
    <button class="op-btn" data-op="*">&times;</button>
    <button class="op-btn" data-op="/">&divide;</button>
  </div>

  <div class="controls-row">
    <button id="resetBtn">Reset</button>
  </div>

  <div id="message"></div>
  <div id="solutionBox"></div>
</div>

<script src="logicgame24.js"></script>
</body>
</html>
